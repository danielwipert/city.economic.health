name: Weekly Economic Data Update

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-economic-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl pillow together python-dotenv jinja2 playwright

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Pull economic data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python pull_economic_data_unified_FIXED.py
      
      - name: Process historical data
        run: python process_historical_data_v2_FIXED.py
      
      - name: Calculate metrics
        run: python calculate_metrics_reconciled_V6.py
      
      - name: Generate cautious LLM summaries
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: python city_econ_pipeline.py

      - name: Generate PDF report
        run: python generate_pdf_report.py

      - name: Generate website
        run: python generate_site.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Weekly economic data update" || true
          git push